<!DOCTYPE html>

<html lang="es">

<head>

<meta charset="UTF-8">

<meta
 name="viewport"
 content="width=device-width, initial-scale=1.0">

<title>
Selector Prysmian Ecuador
</title>

<link
    rel="stylesheet"
    href="css/styles.css">

</head>

<body>

<header>

```
<h1>
    Selector de Cables Prysmian Ecuador
</h1>

<p>
    Asistente Inteligente de Selección
</p>
```

</header>

<div class="container">

```
<div class="left-panel">

    <section class="search-section">

        <h2>
            Buscar Aplicación
        </h2>

        <input
            type="text"
            id="searchInput"
            placeholder="Ej: bomba trifásica 5.5 hp enterrada">

        <button
            id="searchButton">
            Buscar
        </button>

        <div
            id="searchResults">
        </div>

    </section>

    <section>

        <h2>
            Árbol de Productos
        </h2>

        <div id="tree">
        </div>

    </section>

</div>

<div class="right-panel">

    <h2>
        Información
    </h2>

    <div id="info">

        <p>
            Seleccione un producto.
        </p>

    </div>

</div>
```

</div>

<script type="module">

import { generateTree }
from './js/tree.js';

import { initializeSearch }
from './js/search.js';

import {
    initializeRecommendationEngine
}
from './js/recommendationEngine.js';

generateTree();

initializeSearch();

initializeRecommendationEngine();

</script>

</body>

</html>
