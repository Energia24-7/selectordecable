<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Selector Prysmian Ecuador</title>

    <link rel="stylesheet" href="./css/styles.css">

</head>

<body>

    <header>

        <h1>Selector de Cables Prysmian Ecuador</h1>

        <p>Asistente Inteligente de Selección</p>

    </header>

    <main class="container">

        <section class="left-panel">

            <div class="search-panel">

                <input
                    type="text"
                    id="searchInput"
                    placeholder="Ej: bomba trifásica 5.5 HP enterrada">

                <button id="searchButton">
                    Buscar
                </button>

                <div id="searchResults"></div>

            </div>

            <div class="tree-panel">

                <h2>Catálogo</h2>

                <div id="tree"></div>

            </div>

        </section>

        <section class="right-panel">

            <h2>Información del Producto</h2>

            <div id="info">

                <p>
                    Seleccione un producto del árbol
                    o utilice el buscador.
                </p>

            </div>

        </section>

    </main>

    <script type="module">

        import { generateTree }
            from './js/tree.js';

        generateTree();

    </script>

</body>

</html>
